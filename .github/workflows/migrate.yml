name: Apply DB migrations

# Runs only after a PR merges to main (push events on main).
# Preview deploys on Vercel intentionally do NOT trigger this — keeps in-progress
# PRs from mutating the shared production schema.
on:
  push:
    branches: [main]
    paths:
      - "db/migrations/**"
      - "db/schema.prisma"
  workflow_dispatch: # allow manual trigger from GitHub UI

# Serialize concurrent runs so two back-to-back merges don't both try to apply
# migrations simultaneously. Cancel-in-progress: false — never abandon a
# half-applied migration.
concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply pending migrations
        env:
          # DATABASE_URL is the connection used for queries (typically pooled).
          # DIRECT_URL is the unpooled connection Prisma uses for schema changes.
          # Set both as repository secrets in GitHub → Settings → Secrets.
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: npx prisma migrate deploy
